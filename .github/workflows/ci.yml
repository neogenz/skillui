name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Build app bundle
        run: scripts/build-app.sh release

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v5
        with:
          name: Skillui.app
          path: dist/Skillui.app
          if-no-files-found: error
